services:
  streamlit-app:
    build:
      context: .
      dockerfile: apps/chat_bot_ui/Dockerfile
    ports:
      - "8501:8501"
    env_file:
      - .env
    restart: always
    volumes:
      - ./apps/chat_bot_ui/src:/app/apps/chat_bot_ui/src

  
  api-app:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: always
    volumes:
      - ./apps/api/src:/app/apps/api/src

  qdrant:
    image: qdrant/qdrant:latest
    ports: 
      - 6333:6333
      - 6334:6334
    volumes:
      - ./qdrant_data:/qdrant/storage:z
    restart: always

  postgres:
    image: postgres:16-alpine
    ports: 
      - 5433:5432
    environment:
      POSTGRES_DB: langgraph_db
      POSTGRES_USER: langgraph_user
      POSTGRES_PASSWORD: langgraph_password
      PGDATA: /var/lib/postgressql/data/pgdata
    restart: unless-stopped
    volumes:
      - ./postgres_data:/var/lib/postgressql/data

  items_mcp_server:
    build:
      context: .
      dockerfile: apps/items_mcp_server/Dockerfile
    ports:
      - "8001:8000"
    env_file:
      - .env
    restart: always

  reviews_mcp_server:
    build:
      context: .
      dockerfile: apps/reviews_mcp_server/Dockerfile
    ports:
      - "8002:8000"
    env_file:
      - .env
    restart: always